name: Generuj klucz

# Uruchamiany RECZNIE z zakladki Actions (przycisk "Run workflow").
# Generuje keystore, koduje do base64 i udostepnia jako artefakt.
# Po wykorzystaniu mozna ten plik usunac.
on:
  workflow_dispatch:
    inputs:
      keystore_password:
        description: 'Haslo do keystore (zapamietaj je!)'
        required: true
      key_alias:
        description: 'Alias klucza'
        required: true
        default: 'notatki'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Ustaw Jave 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Wygeneruj keystore
        run: |
          keytool -genkey -v \
            -keystore notatki-release.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias "${{ github.event.inputs.key_alias }}" \
            -storepass "${{ github.event.inputs.keystore_password }}" \
            -keypass "${{ github.event.inputs.keystore_password }}" \
            -dname "CN=Notatki, OU=Personal, O=Personal, L=Unknown, ST=Unknown, C=PL"

      - name: Zakoduj do base64
        run: base64 -w 0 notatki-release.jks > keystore-base64.txt

      - name: Udostepnij pliki jako artefakt
        uses: actions/upload-artifact@v4
        with:
          name: keystore-files
          path: |
            notatki-release.jks
            keystore-base64.txt
          retention-days: 1
