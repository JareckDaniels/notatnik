plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// Wczytanie danych klucza podpisujacego z key.properties (jesli istnieje).
// Plik tworzony jest przez GitHub Actions z sekretow; lokalnie moze go nie byc.
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
def hasKeystore = keystorePropertiesFile.exists()
if (hasKeystore) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.example.notatki"
    compileSdk = 35

    compileOptions {
        // Wymagane przez flutter_local_notifications (desugaring)
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.example.notatki"
        minSdk = 21
        targetSdk = 35
        versionCode = 20
        versionName = "1.2.3"
        multiDexEnabled = true
    }

    signingConfigs {
        release {
            if (hasKeystore) {
                keyAlias = keystoreProperties['keyAlias']
                keyPassword = keystoreProperties['keyPassword']
                storeFile = file(keystoreProperties['storeFile'])
                storePassword = keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            // Jesli mamy keystore (GitHub Actions) - podpisz nim.
            // Jesli nie (np. lokalny build) - awaryjnie kluczem debug.
            signingConfig = hasKeystore ? signingConfigs.release : signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.2'
}
