name: Build APK

# Uruchamia się przy każdym wgraniu kodu do gałęzi main,
# a także ręcznie z zakładki Actions na GitHubie.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pobranie kodu z repozytorium
      - name: Pobierz kod
        uses: actions/checkout@v4

      # 2. Instalacja Javy (wymaganej do budowania Androida)
      - name: Ustaw Javę 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Instalacja Fluttera
      - name: Ustaw Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      # 4. Pobranie zależności projektu
      - name: Pobierz pakiety
        run: flutter pub get

      # 5. Zbudowanie pliku APK (release)
      - name: Zbuduj APK
        run: flutter build apk --release

      # 6. Udostępnienie gotowego APK do pobrania
      - name: Wgraj APK jako artefakt
        uses: actions/upload-artifact@v4
        with:
          name: notatki-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
