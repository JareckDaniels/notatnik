name: notatki
description: Aplikacja do notatek z przypomnieniami
publish_to: 'none'
version: 1.1.5+16

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # Baza danych SQLite
  sqflite: ^2.3.3
  path: ^1.9.0
  # Powiadomienia i alarmy
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  # Zapis ustawien
  shared_preferences: ^2.3.2
  # Formatowanie dat
  intl: ^0.19.0
  # Eksport / import kopii zapasowej
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  file_picker: ^8.1.2
  # Siatka notatek o roznej wysokosci (jak w Google Keep)
  flutter_staggered_grid_view: ^0.7.0
  # Odczyt numeru wersji aplikacji
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
