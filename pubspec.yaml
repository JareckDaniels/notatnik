name: notatki
description: Aplikacja do notatek z przypomnieniami
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # Baza danych SQLite
  sqflite: ^2.3.3
  path: ^1.9.0
  # Powiadomienia i alarmy
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  # Zapis ustawień
  shared_preferences: ^2.3.2
  # Strefa czasowa / formatowanie dat
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
